services:
  postgres:
    image: postgres:16
    container_name: student-mcp-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MCP_READER_PASSWORD: ${MCP_READER_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - student_pgdata:/var/lib/postgresql/data
      # 컨테이너가 처음 init 될 때 알파벳 순서로 자동 실행됨
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_roles.sh:/docker-entrypoint-initdb.d/02_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  student_pgdata:
