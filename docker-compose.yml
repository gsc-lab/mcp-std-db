services:
  postgres:
    image: postgres:16
    container_name: student-mcp-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MCP_READER_PASSWORD: ${MCP_READER_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - student_pgdata:/var/lib/postgresql/data
      # 컨테이너가 처음 init 될 때 알파벳 순서로 자동 실행됨
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_roles.sh:/docker-entrypoint-initdb.d/02_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # DB 테이블 브라우저 — http://localhost:8080
  # 학습/디버깅용. 로그인 시 시스템=PostgreSQL, 서버=postgres(컨테이너명) 그대로,
  # 사용자/비밀번호는 .env 의 POSTGRES_USER / POSTGRES_PASSWORD.
  adminer:
    image: adminer:4
    container_name: student-mcp-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"

  # 대화 메모리 저장소 (web v3) — key=conv:{session_id}, TTL 24h
  # --appendonly yes: AOF 영속화 (재시작해도 대화 유지)
  redis:
    image: redis:7-alpine
    container_name: student-mcp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - student_redis:/data

volumes:
  student_pgdata:
  student_redis:
